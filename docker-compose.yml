services:
  backend:
    build: ./backend
    ports:
      - "8080:8000"
    volumes:
      - backend-data:/app/storage/data
    restart: unless-stopped
    healthcheck:
      test: curl -sf http://localhost:8000/up || exit 1
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data:
